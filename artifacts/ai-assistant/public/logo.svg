<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="55%" gradientUnits="objectBoundingBox">
      <stop stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill/squircle -->
  <rect width="256" height="256" rx="68" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="256" height="256" rx="68" fill="url(#shine)"/>

  <!-- Bold "L" letter -->
  <rect x="74" y="68" width="26" height="120" rx="13" fill="white"/>
  <rect x="74" y="162" width="110" height="26" rx="13" fill="white"/>

  <!-- Sparkle top-right -->
  <g filter="url(#glow)" opacity="0.95">
    <!-- Main star -->
    <path d="M193 72 L196 82 L206 85 L196 88 L193 98 L190 88 L180 85 L190 82 Z" fill="white"/>
    <!-- Small dot -->
    <circle cx="213" cy="64" r="3.5" fill="white" opacity="0.7"/>
    <!-- Tiny dot -->
    <circle cx="178" cy="62" r="2" fill="white" opacity="0.5"/>
  </g>
</svg>
