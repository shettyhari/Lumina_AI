<svg viewBox="0 0 960 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ll-grad" x1="45" y1="0" x2="115" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B2FC9"/>
      <stop offset="100%" stop-color="#E91E8C"/>
    </linearGradient>
    <linearGradient id="lh-grad" x1="80" y1="0" x2="228" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#C0268A"/>
    </linearGradient>
  </defs>

  <!-- L vertical -->
  <line x1="80" y1="36" x2="80" y2="298" stroke="url(#ll-grad)" stroke-width="70" stroke-linecap="round"/>
  <!-- L horizontal -->
  <line x1="80" y1="334" x2="228" y2="334" stroke="url(#lh-grad)" stroke-width="70" stroke-linecap="round"/>

  <!-- I -->
  <line x1="296" y1="36" x2="296" y2="334" stroke="#E91E8C" stroke-width="70" stroke-linecap="round"/>

  <!-- N left -->
  <line x1="364" y1="36" x2="364" y2="334" stroke="#1BBFD4" stroke-width="70" stroke-linecap="round"/>
  <!-- N diagonal -->
  <line x1="364" y1="36" x2="506" y2="334" stroke="#1BBFD4" stroke-width="70" stroke-linecap="round"/>
  <!-- N right -->
  <line x1="506" y1="36" x2="506" y2="334" stroke="#1BBFD4" stroke-width="70" stroke-linecap="round"/>

  <!-- A left leg -->
  <line x1="614" y1="334" x2="752" y2="36" stroke="#8B2FC9" stroke-width="70" stroke-linecap="round"/>
  <!-- A right leg -->
  <line x1="752" y1="36" x2="890" y2="334" stroke="#1BBFD4" stroke-width="70" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="648" y1="222" x2="856" y2="222" stroke="#FF8C00" stroke-width="70" stroke-linecap="round"/>

  <!-- Decorative lines -->
  <line x1="48" y1="412" x2="294" y2="412" stroke="#E91E8C" stroke-width="2"/>
  <circle cx="298" cy="412" r="5" fill="#E91E8C"/>
  <circle cx="662" cy="412" r="5" fill="#1BBFD4"/>
  <line x1="666" y1="412" x2="912" y2="412" stroke="#1BBFD4" stroke-width="2"/>

  <!-- ASSISTANT -->
  <text x="480" y="418" text-anchor="middle"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="30" font-weight="500" letter-spacing="9" fill="#5A5A5A">ASSISTANT</text>
</svg>
