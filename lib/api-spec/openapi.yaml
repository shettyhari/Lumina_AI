openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Personal AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: gemini
    description: Gemini AI chat and image operations
  - name: conversations
    description: Conversation management
  - name: user
    description: User profile and preferences
  - name: ai
    description: AI memory and personas
  - name: admin
    description: Family admin operations
  - name: family
    description: Family communication hub
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/stats:
    get:
      operationId: getUserStats
      tags: [user]
      summary: Get user activity statistics
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "401":
          description: Unauthorized

  /user/api-keys:
    get:
      operationId: listUserApiKeys
      tags: [user]
      summary: List configured API key providers (keys are masked)
      responses:
        "200":
          description: List of configured providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserApiKeyEntry"
        "401":
          description: Unauthorized
    post:
      operationId: setUserApiKey
      tags: [user]
      summary: Set API key for a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetApiKeyInput"
      responses:
        "200":
          description: Key saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiKeyEntry"
        "401":
          description: Unauthorized

  /user/api-keys/{provider}:
    delete:
      operationId: deleteUserApiKey
      tags: [user]
      summary: Delete API key for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations for the authenticated user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
        "401":
          description: Unauthorized
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
        "401":
          description: Unauthorized

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation by ID with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
    patch:
      operationId: updateGeminiConversation
      tags: [gemini]
      summary: Update a conversation (title, pinned)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationUpdate"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
        "404":
          description: Not found
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiMessageInput"
      responses:
        "200":
          description: Streaming response (text/event-stream)
          content:
            text/event-stream: {}

  /gemini/conversations/{id}/export:
    get:
      operationId: exportConversation
      tags: [gemini]
      summary: Export conversation as Markdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationExport"
        "404":
          description: Not found

  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiImageOutput"

  /gemini/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [gemini]
      summary: Get recent conversations with last message preview
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationActivity"

  /gemini/pinned:
    get:
      operationId: getPinnedConversations
      tags: [gemini]
      summary: Get pinned conversations
      responses:
        "200":
          description: Pinned conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"

  /gemini/digest:
    get:
      operationId: getAiDigest
      tags: [gemini]
      summary: Get AI-generated daily digest from recent conversations
      responses:
        "200":
          description: Daily digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiDigest"
        "401":
          description: Unauthorized

  /models:
    get:
      operationId: listModels
      tags: [gemini]
      summary: List all available AI models with provider info
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelInfo"

  /ai/memories:
    get:
      operationId: listAiMemories
      tags: [ai]
      summary: List all AI memories for the user
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiMemory"
        "401":
          description: Unauthorized
    post:
      operationId: createAiMemory
      tags: [ai]
      summary: Create a new AI memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiMemoryInput"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemory"
        "401":
          description: Unauthorized

  /ai/memories/{id}:
    delete:
      operationId: deleteAiMemory
      tags: [ai]
      summary: Delete an AI memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /ai/personas:
    get:
      operationId: listAiPersonas
      tags: [ai]
      summary: List AI personas for the user
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized
    post:
      operationId: createAiPersona
      tags: [ai]
      summary: Create a new AI persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPersonaInput"
      responses:
        "201":
          description: Created persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized

  /user/status:
    get:
      operationId: getUserStatus
      tags: [user]
      summary: Get current user's family membership status and feature flags
      responses:
        "200":
          description: User family status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatus"
        "401":
          description: Unauthorized

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all family members (admin only)
      responses:
        "200":
          description: List of family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
        "403":
          description: Forbidden

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get family-wide storage and member count stats (admin only)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden

  /admin/users/{userId}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update a family member's status, quota, or feature flags (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFamilyMemberInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Remove a family member (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden

  /family/members:
    get:
      operationId: listFamilyMembers
      tags: [family]
      summary: List approved family members with name and avatar
      responses:
        "200":
          description: Approved family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMemberPublic"
        "401":
          description: Unauthorized

  /family/notifications:
    get:
      operationId: listFamilyNotifications
      tags: [family]
      summary: List unread relay notifications for the current user
      responses:
        "200":
          description: Unread notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyNotification"
        "401":
          description: Unauthorized

  /family/notifications/count:
    get:
      operationId: getFamilyNotificationCount
      tags: [family]
      summary: Get unread notification count
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyNotificationCount"
        "401":
          description: Unauthorized

  /family/notifications/read-all:
    patch:
      operationId: markAllFamilyNotificationsRead
      tags: [family]
      summary: Mark all notifications as read
      responses:
        "204":
          description: All marked read
        "401":
          description: Unauthorized

  /family/notifications/{id}/read:
    patch:
      operationId: markFamilyNotificationRead
      tags: [family]
      summary: Mark a single relay notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Marked read
        "401":
          description: Unauthorized

  /family/room/messages:
    get:
      operationId: listFamilyRoomMessages
      tags: [family]
      summary: Get family room messages (paginated, supports ?after=<id>)
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Room messages with sender info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyRoomMessageEnriched"
        "401":
          description: Unauthorized
    post:
      operationId: sendFamilyRoomMessage
      tags: [family]
      summary: Post a message to the family room (triggers AI if @Lumina is mentioned)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFamilyRoomMessageInput"
      responses:
        "201":
          description: Created message(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendFamilyRoomMessageResponse"
        "401":
          description: Unauthorized

  /ai/personas/{id}:
    patch:
      operationId: updateAiPersona
      tags: [ai]
      summary: Update an AI persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPersonaUpdate"
      responses:
        "200":
          description: Updated persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteAiPersona
      tags: [ai]
      summary: Delete an AI persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
      required:
        - status
        - timestamp

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        displayName:
          type: ["string", "null"]
        preferredModel:
          type: string
        systemPrompt:
          type: ["string", "null"]
        theme:
          type: string
        imagesGenerated:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - preferredModel
        - theme
        - imagesGenerated
        - createdAt
        - updatedAt

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        preferredModel:
          type: string
        systemPrompt:
          type: string
        theme:
          type: string

    UserStats:
      type: object
      properties:
        totalConversations:
          type: integer
        totalMessages:
          type: integer
        imagesGenerated:
          type: integer
        memoriesCount:
          type: integer
        personasCount:
          type: integer
      required:
        - totalConversations
        - totalMessages
        - imagesGenerated
        - memoriesCount
        - personasCount

    GeminiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        pinned:
          type: boolean
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - pinned
        - messageCount
        - createdAt
        - updatedAt

    GeminiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    GeminiConversationUpdate:
      type: object
      properties:
        title:
          type: string
        pinned:
          type: boolean

    GeminiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        imageData:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    GeminiMessageInput:
      type: object
      properties:
        content:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        imageBase64:
          type: string
        imageMimeType:
          type: string
        reasoningMode:
          type: boolean
      required:
        - content

    GeminiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        pinned:
          type: boolean
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GeminiMessage"
      required:
        - id
        - title
        - pinned
        - messageCount
        - createdAt
        - updatedAt
        - messages

    GeminiImageInput:
      type: object
      properties:
        prompt:
          type: string
        style:
          type: string
        aspectRatio:
          type: string
      required:
        - prompt

    GeminiImageOutput:
      type: object
      properties:
        b64_json:
          type: string
        mimeType:
          type: string
      required:
        - b64_json
        - mimeType

    ConversationActivity:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        pinned:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        messageCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - pinned
        - messageCount
        - updatedAt

    ConversationExport:
      type: object
      properties:
        title:
          type: string
        markdown:
          type: string
        exportedAt:
          type: string
          format: date-time
      required:
        - title
        - markdown
        - exportedAt

    AiDigest:
      type: object
      properties:
        summary:
          type: string
        generatedAt:
          type: string
          format: date-time
        conversationCount:
          type: integer
      required:
        - summary
        - generatedAt
        - conversationCount

    ModelInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        description:
          type: string
        requiresKey:
          type: boolean
        contextWindow:
          type: ["integer", "null"]
        supportsStreaming:
          type: boolean
      required:
        - id
        - name
        - provider
        - description
        - requiresKey
        - supportsStreaming

    UserApiKeyEntry:
      type: object
      properties:
        provider:
          type: string
        maskedKey:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - provider
        - maskedKey
        - createdAt

    ApiKeyInput:
      type: object
      properties:
        key:
          type: string
      required:
        - key

    SetApiKeyInput:
      type: object
      properties:
        provider:
          type: string
        key:
          type: string
      required:
        - provider
        - key

    AiMemory:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - createdAt

    AiMemoryInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AiPersona:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        emoji:
          type: string
        systemPrompt:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - emoji
        - systemPrompt
        - isDefault
        - createdAt
        - updatedAt

    AiPersonaInput:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        systemPrompt:
          type: string
        isDefault:
          type: boolean
      required:
        - name
        - systemPrompt

    AiPersonaUpdate:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        systemPrompt:
          type: string
        isDefault:
          type: boolean

    FeatureFlags:
      type: object
      properties:
        imageGen:
          type: boolean
        voiceChat:
          type: boolean
        personas:
          type: boolean
        memories:
          type: boolean

    UserStatus:
      type: object
      properties:
        status:
          type: string
        role:
          type: string
        isAdmin:
          type: boolean
        storageQuotaBytes:
          type: integer
        storageUsedBytes:
          type: integer
        featureFlags:
          $ref: "#/components/schemas/FeatureFlags"
      required:
        - status
        - role
        - isAdmin
        - storageQuotaBytes
        - storageUsedBytes
        - featureFlags

    FamilyMember:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
        status:
          type: string
        storageQuotaBytes:
          type: integer
        storageUsedBytes:
          type: integer
        featureFlags:
          $ref: "#/components/schemas/FeatureFlags"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - role
        - status
        - storageQuotaBytes
        - storageUsedBytes
        - featureFlags
        - createdAt
        - updatedAt

    UpdateFamilyMemberInput:
      type: object
      properties:
        status:
          type: string
        displayName:
          type: string
        storageQuotaBytes:
          type: integer
