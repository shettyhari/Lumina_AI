openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Personal AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: gemini
    description: Gemini AI chat and image operations
  - name: conversations
    description: Conversation management
  - name: user
    description: User profile and preferences
  - name: ai
    description: AI memory and personas
  - name: admin
    description: Family admin operations
  - name: family
    description: Family communication hub
  - name: home
    description: Home organization tools
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /user/stats:
    get:
      operationId: getUserStats
      tags: [user]
      summary: Get user activity statistics
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "401":
          description: Unauthorized

  /user/api-keys:
    get:
      operationId: listUserApiKeys
      tags: [user]
      summary: List configured API key providers (keys are masked)
      responses:
        "200":
          description: List of configured providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserApiKeyEntry"
        "401":
          description: Unauthorized
    post:
      operationId: setUserApiKey
      tags: [user]
      summary: Set API key for a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetApiKeyInput"
      responses:
        "200":
          description: Key saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiKeyEntry"
        "401":
          description: Unauthorized

  /user/api-keys/{provider}:
    delete:
      operationId: deleteUserApiKey
      tags: [user]
      summary: Delete API key for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations for the authenticated user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
        "401":
          description: Unauthorized
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
        "401":
          description: Unauthorized

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation by ID with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
    patch:
      operationId: updateGeminiConversation
      tags: [gemini]
      summary: Update a conversation (title, pinned)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationUpdate"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
        "404":
          description: Not found
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiMessageInput"
      responses:
        "200":
          description: Streaming response (text/event-stream)
          content:
            text/event-stream: {}

  /gemini/conversations/{id}/export:
    get:
      operationId: exportConversation
      tags: [gemini]
      summary: Export conversation as Markdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationExport"
        "404":
          description: Not found

  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiImageOutput"

  /gemini/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [gemini]
      summary: Get recent conversations with last message preview
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationActivity"

  /gemini/pinned:
    get:
      operationId: getPinnedConversations
      tags: [gemini]
      summary: Get pinned conversations
      responses:
        "200":
          description: Pinned conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"

  /gemini/digest:
    get:
      operationId: getAiDigest
      tags: [gemini]
      summary: Get AI-generated daily digest from recent conversations
      responses:
        "200":
          description: Daily digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiDigest"
        "401":
          description: Unauthorized

  /models:
    get:
      operationId: listModels
      tags: [gemini]
      summary: List all available AI models with provider info
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelInfo"

  /ai/memories:
    get:
      operationId: listAiMemories
      tags: [ai]
      summary: List all AI memories for the user
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiMemory"
        "401":
          description: Unauthorized
    post:
      operationId: createAiMemory
      tags: [ai]
      summary: Create a new AI memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiMemoryInput"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemory"
        "401":
          description: Unauthorized

  /ai/memories/{id}:
    delete:
      operationId: deleteAiMemory
      tags: [ai]
      summary: Delete an AI memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /ai/personas:
    get:
      operationId: listAiPersonas
      tags: [ai]
      summary: List AI personas for the user
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized
    post:
      operationId: createAiPersona
      tags: [ai]
      summary: Create a new AI persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPersonaInput"
      responses:
        "201":
          description: Created persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized

  /user/status:
    get:
      operationId: getUserStatus
      tags: [user]
      summary: Get current user's family membership status and feature flags
      responses:
        "200":
          description: User family status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatus"
        "401":
          description: Unauthorized

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all family members (admin only)
      responses:
        "200":
          description: List of family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
        "403":
          description: Forbidden

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get family-wide storage and member count stats (admin only)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden

  /admin/users/{userId}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update a family member's status, quota, or feature flags (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFamilyMemberInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Remove a family member (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden

  /family/members:
    get:
      operationId: listFamilyMembers
      tags: [family]
      summary: List approved family members with name and avatar
      responses:
        "200":
          description: Approved family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMemberPublic"
        "401":
          description: Unauthorized

  /family/notifications:
    get:
      operationId: listFamilyNotifications
      tags: [family]
      summary: List unread relay notifications for the current user
      responses:
        "200":
          description: Unread notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyNotification"
        "401":
          description: Unauthorized

  /family/notifications/count:
    get:
      operationId: getFamilyNotificationCount
      tags: [family]
      summary: Get unread notification count
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyNotificationCount"
        "401":
          description: Unauthorized

  /family/notifications/read-all:
    patch:
      operationId: markAllFamilyNotificationsRead
      tags: [family]
      summary: Mark all notifications as read
      responses:
        "204":
          description: All marked read
        "401":
          description: Unauthorized

  /family/notifications/{id}/read:
    patch:
      operationId: markFamilyNotificationRead
      tags: [family]
      summary: Mark a single relay notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Marked read
        "401":
          description: Unauthorized

  /family/room/messages:
    get:
      operationId: listFamilyRoomMessages
      tags: [family]
      summary: Get family room messages (paginated, supports ?after=<id>)
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Room messages with sender info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyRoomMessageEnriched"
        "401":
          description: Unauthorized
    post:
      operationId: sendFamilyRoomMessage
      tags: [family]
      summary: Post a message to the family room (triggers AI if @Lumina is mentioned)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFamilyRoomMessageInput"
      responses:
        "201":
          description: Created message(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendFamilyRoomMessageResponse"
        "401":
          description: Unauthorized

  /ai/personas/{id}:
    patch:
      operationId: updateAiPersona
      tags: [ai]
      summary: Update an AI persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPersonaUpdate"
      responses:
        "200":
          description: Updated persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersona"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteAiPersona
      tags: [ai]
      summary: Delete an AI persona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /shopping:
    get:
      operationId: listShoppingItems
      tags: [home]
      summary: List all shopping items (shared across family)
      responses:
        "200":
          description: Shopping items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShoppingItem"
    post:
      operationId: createShoppingItem
      tags: [home]
      summary: Add a shopping item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShoppingItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingItem"

  /shopping/completed:
    delete:
      operationId: clearCompletedShoppingItems
      tags: [home]
      summary: Delete all checked/completed shopping items
      responses:
        "204":
          description: Cleared

  /shopping/{id}:
    patch:
      operationId: updateShoppingItem
      tags: [home]
      summary: Update a shopping item (toggle checked, edit name etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShoppingItemInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingItem"
    delete:
      operationId: deleteShoppingItem
      tags: [home]
      summary: Delete a shopping item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chores:
    get:
      operationId: listChores
      tags: [home]
      summary: List all family chores
      responses:
        "200":
          description: Chores list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chore"
    post:
      operationId: createChore
      tags: [home]
      summary: Create a new chore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChoreInput"
      responses:
        "201":
          description: Created chore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chore"

  /chores/{id}:
    patch:
      operationId: updateChore
      tags: [home]
      summary: Update a chore (status, priority, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChoreInput"
      responses:
        "200":
          description: Updated chore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chore"
    delete:
      operationId: deleteChore
      tags: [home]
      summary: Delete a chore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /calendar:
    get:
      operationId: listFamilyEvents
      tags: [home]
      summary: List family events (optionally filtered by year/month)
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Family events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyEventEnriched"
    post:
      operationId: createFamilyEvent
      tags: [home]
      summary: Create a family calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyEventEnriched"

  /calendar/{id}:
    delete:
      operationId: deleteFamilyEvent
      tags: [home]
      summary: Delete a family calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reminders:
    get:
      operationId: listReminders
      tags: [home]
      summary: List current user's reminders
      responses:
        "200":
          description: Reminders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reminder"
    post:
      operationId: createReminder
      tags: [home]
      summary: Create a reminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReminderInput"
      responses:
        "201":
          description: Created reminder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"

  /reminders/due:
    get:
      operationId: getDueReminders
      tags: [home]
      summary: Get reminders that are now due (marks them triggered)
      responses:
        "200":
          description: Due reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reminder"

  /reminders/{id}:
    delete:
      operationId: deleteReminder
      tags: [home]
      summary: Delete a reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /meals:
    get:
      operationId: listMealPlans
      tags: [home]
      summary: Get meal plan for a week
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meal plan entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlanEntry"
    post:
      operationId: saveMealPlan
      tags: [home]
      summary: Create or replace a meal slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMealPlanInput"
      responses:
        "201":
          description: Saved meal plan entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanEntry"

  /meals/ai-suggest:
    post:
      operationId: aiSuggestMeal
      tags: [home]
      summary: Get an AI meal suggestion for a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiMealSuggestInput"
      responses:
        "200":
          description: AI meal suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMealSuggestResponse"

  /meals/week:
    delete:
      operationId: clearMealPlanWeek
      tags: [home]
      summary: Clear all meals for a week (admin only)
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Cleared

  /meals/{id}:
    delete:
      operationId: deleteMealPlan
      tags: [home]
      summary: Delete a single meal plan entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
      required:
        - status
        - timestamp

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        displayName:
          type: ["string", "null"]
        preferredModel:
          type: string
        systemPrompt:
          type: ["string", "null"]
        theme:
          type: string
        imagesGenerated:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - preferredModel
        - theme
        - imagesGenerated
        - createdAt
        - updatedAt

